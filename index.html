<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>층별 하자보수 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.top-bar{background:#1a1a1a;color:#fff;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:56px}
.top-bar .logo{font-size:15px;font-weight:600;letter-spacing:-.3px}
.save-chip{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.chip-ok{background:#1a3d1a;color:#7ecb7e}
.chip-ing{background:#3d3000;color:#f0c040}
.chip-err{background:#3d1a1a;color:#f07e7e}
.container{max-width:860px;margin:0 auto;padding:1.5rem 1rem}
.page-title{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:.25rem;letter-spacing:-.5px}
.page-sub{font-size:13px;color:#888;margin-bottom:1.25rem}

/* 층 선택 버튼: 모바일에서 넘치면 자연스럽게 흐르도록 */
.floor-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.ftab{padding:8px 16px;border-radius:22px;border:1.5px solid #ddd;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.ftab:hover{border-color:#999;color:#333}
.ftab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* 상단 통계 현황판: 모바일에서는 2열로 배치하여 네모칸이 작아지는 것 방지 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr);gap:8px}
}
.sc{background:#fff;border-radius:12px;padding:1rem;border:1px solid #ebebeb}
.sc-l{font-size:11px;color:#999;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.sc-v{font-size:24px;font-weight:700}

/* 하자 리스트 카드 */
.list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.dc{background:#fff;border:1px solid #ebebeb;border-radius:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.dc:hover{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,.06)}

/* 리스트 메인 영역: 모바일에서 버튼들이 찌그러지지 않게 정렬 조정 */
.dc-main{display:flex;align-items:center;gap:12px;padding:1rem}
@media(max-width:500px){
  .dc-main{flex-wrap:wrap;position:relative;padding-bottom:3.5rem}
}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;cursor:pointer}
.dc-body{flex:1;min-width:0}
.dc-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:4px;word-break:break-all}
.dc-meta{font-size:12px;color:#999}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;flex-shrink:0;text-align:center}

/* 수정/삭제 버튼 위치: 모바일에서는 카드 하단 우측으로 정렬 고정 */
.acts{display:flex;gap:4px;flex-shrink:0}
@media(max-width:500px){
  .badge{position:absolute;top:1rem;right:1rem}
  .acts{position:absolute;bottom:0.75rem;right:1rem}
}
.ba{background:none;border:1px solid transparent;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;padding:5px 11px;color:#999}
.ba:hover{background:#f5f5f3;border-color:#ddd;color:#333}
.ba.r:hover{background:#fff0f0;border-color:#ffbbbb;color:#cc3333}

/* 수정창 내부 입력칸 */
.ef{border-top:1px solid #f0f0f0;padding:1rem;background:#fafafa}
.ef-title{font-size:11px;font-weight:600;color:#999;margin-bottom:.75rem}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:500px){
  .eg{grid-template-columns:1fr}
}
.fl label{font-size:11px;color:#888;font-weight:500;display:block;margin-bottom:4px}
.fl input,.fl select{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.ea{display:flex;gap:8px;margin-top:.75rem}
.bok{flex:1;padding:10px;font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;border:none;background:#1a1a1a;color:#fff}
.bng{padding:10px 18px;font-size:13px;cursor:pointer;border-radius:9px;border:1px solid #ddd;background:#fff;color:#888}

/* 삭제 바 */
.del-bar{background:#fff5f5;border-top:1px solid #ffdddd;padding:.75rem 1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.del-bar span{flex:1;font-size:13px;color:#cc3333;font-weight:500;min-width:150px}
.bdok{padding:6px 16px;border-radius:8px;border:none;background:#e03030;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.bdng{padding:6px 14px;border-radius:8px;border:1px solid #ffbbbb;background:#fff;color:#cc3333;font-size:12px;cursor:pointer}

/* 등록 박스 */
.add-box{background:#fff;border-radius:16px;padding:1.25rem;border:1px solid #ebebeb}
.add-box-title{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:1rem}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:500px){
  .ag{grid-template-columns:1fr}
}
.badd{width:100%;padding:12px;font-size:14px;font-weight:700;cursor:pointer;border-radius:10px;border:none;background:#1a1a1a;color:#fff;margin-top:.5rem}

.empty{text-align:center;padding:3rem 1rem;color:#bbb;font-size:14px;border:1.5px dashed #e5e5e5;border-radius:14px}
.empty-icon{font-size:32px;margin-bottom:.5rem}
.loading{text-align:center;padding:4rem;color:#aaa;font-size:14px}

/* 상단 버튼들 */
.btn-xl{padding:6px 12px;border-radius:20px;border:none;background:#2d6a2d;color:#7ecb7e;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-cal{padding:6px 12px;border-radius:20px;border:none;background:#1a3d5c;color:#7ec8e3;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}

/* 달력 모달 팝업창: 모바일 꽉 차게 최적화 */
.cal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:40px 10px}
@media(max-width:600px){ .cal-overlay{padding:10px 6px} }
.cal-overlay.open{display:flex}
.cal-modal{background:#fff;border-radius:20px;width:860px;max-width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.cal-head{background:#1a1a1a;color:#fff;padding:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:2px 10px}
.cal-nav span{font-size:14px;font-weight:600;min-width:80px;text-align:center}
.cal-close{background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:2px 6px}
.cal-body{flex:1;padding:8px;overflow-y:auto}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow span{text-align:center;font-size:11px;font-weight:600;color:#999;padding:4px}

/* 달력 그리드 네모칸: 모바일에서 높이가 쪼그라들지 않도록 최소 높이 지정 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{min-height:85px;border-radius:8px;border:1px solid #f0f0f0;padding:4px;cursor:pointer;background:#fafafa;display:flex;flex-direction:column;justify-content:between}
@media(max-width:600px){ .cal-day{min-height:65px;padding:2px} }
.cal-day:hover{border-color:#999;background:#f0f0ee}
.cal-day.today{border-color:#1a1a1a;background:#f7f7f5}
.cal-day.other-month .cal-day-num{color:#ccc}
.cal-day-num{font-size:11px;font-weight:600;color:#333;margin-bottom:2px}
.cal-day.today .cal-day-num span{background:#1a1a1a;color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.cal-dot-row{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}

/* 달력 안의 하자 요약 글자 태그: 모바일에서는 폰트를 더 작게 */
.cal-dot{font-size:9px;padding:1px 3px;border-radius:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
@media(max-width:600px){ .cal-dot{font-size:8px;letter-spacing:-0.5px;padding:1px} }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="top-bar">
  <span class="logo">하자보수 관리</span>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="btn-cal" onclick="openCal()">📅 달력</button>
    <button class="btn-xl" onclick="exportXlsx()">엑셀</button>
    <span class="save-chip chip-ing" id="saveChip">연결 중</span>
  </div>
</div>

<div class="cal-overlay" id="calOverlay" onclick="if(event.target===this)closeCal()">
  <div class="cal-modal">
    <div class="cal-head">
      <div class="cal-nav">
        <button onclick="calMove(-1)">&#8249;</button>
        <span id="calTitle"></span>
        <button onclick="calMove(1)">&#8250;</button>
      </div>
      <div style="font-size:14px;font-weight:700">하자 일정 달력</div>
      <button class="cal-close" onclick="closeCal()">✕</button>
    </div>
    <div class="cal-body">
      <div class="cal-dow">
        <span style="color:#e03030">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span style="color:#1a73e8">토</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="page-title" id="pageTitle">B1층</div>
  <div class="page-sub" id="pageSub">불러오는 중...</div>
  <div class="floor-row" id="floorRow"></div>
  <div class="stats" id="stats"></div>
  <div class="list" id="list"><div class="loading">Firebase 연결 중...</div></div>

  <div class="add-box">
    <div class="add-box-title">새 하자 등록</div>
    <div class="ag">
      <div class="fl"><label>층</label><select id="nfl"></select></div>
      <div class="fl"><label>상태</label><select id="ns"><option>미착수</option><option>진행중</option><option>완료</option></select></div>
    </div>
    <div class="fl" style="margin-bottom:10px"><label>하자 내용</label><input id="nt" type="text" placeholder="예: 천장 누수, 바닥 균열"></div>
    <div class="ag">
      <div class="fl"><label>위치/구역</label><input id="nl" type="text" placeholder="예: 북쪽 복도"></div>
      <div class="fl"><label>담당자</label><input id="np" type="text" placeholder="이름"></div>
    </div>
    <div class="fl"><label>예정일</label><input id="nd" type="date"></div>
    <button class="badd" onclick="addNew()">+ 등록</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDViAWjs47CLk7VI5uP33zLhC_HALY-r44",
  authDomain: "haja-manager.firebaseapp.com",
  projectId: "haja-manager",
  storageBucket: "haja-manager.firebasestorage.app",
  messagingSenderId: "938357281606",
  appId: "1:938357281606:web:ac448231144b82e5d54b47"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, 'haja');

const FLOORS = ['B1','1F','2F','3F','4F','5F','RF'];
const SL = ['미착수','진행중','완료'];
let cur = 'B1', delId = null, editId = null;
let D = {};
FLOORS.forEach(f => D[f] = []);

function setChip(state) {
  const el = document.getElementById('saveChip');
  if(!el) return;
  if(state==='ok'||state==='live'){el.textContent='실시간';el.className='save-chip chip-ok';}
  else if(state==='ing'){el.textContent='저장중';el.className='save-chip chip-ing';}
  else{el.textContent='오류';el.className='save-chip chip-err';}
}

function sBg(s){return s==='미착수'?'#fff0f0':s==='진행중'?'#fffbf0':'#f0fff4'}
function sTx(s){return s==='미착수'?'#cc3333':s==='진행중'?'#996600':'#2d8a2d'}
function sDot(s){return s==='미착수'?'#e03030':s==='진행중'?'#e09000':'#30a030'}
function fmtD(d){if(!d)return '날짜 미정';var p=d.split('-');return parseInt(p[1])+'월 '+parseInt(p[2])+'일';}
function findItem(id){for(const f of FLOORS){const it=D[f].find(x=>x.id===id);if(it)return it;}return null;}

onSnapshot(colRef, (snapshot) => {
  FLOORS.forEach(f => D[f] = []);
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    if(FLOORS.includes(data.floor)) { D[data.floor].push({id: docSnap.id, ...data}); }
  });
  FLOORS.forEach(f => { D[f].sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0)); });
  setChip('live');
  render();
  if(document.getElementById('calOverlay').classList.contains('open')) renderCal();
}, () => setChip('err'));

async function addNew() {
  const fl = document.getElementById('nfl').value;
  const t = document.getElementById('nt').value.trim();
  if(!t){alert('하자 내용을 입력하세요');return;}
  setChip('ing');
  try {
    await addDoc(colRef, {
      floor: fl, title: t, loc: document.getElementById('nl').value || '-', status: document.getElementById('ns').value,
      date: document.getElementById('nd').value || '', person: document.getElementById('np').value || '-', createdAt: serverTimestamp()
    });
    ['nt','nl','np','nd'].forEach(x => document.getElementById(x).value = '');
    if(fl !== cur) cur = fl;
  } catch(e){ alert('저장 실패: '+e.message); setChip('err'); }
}

async function cycleS(id) {
  const it = findItem(id); if(!it) return;
  setChip('ing');
  try { await updateDoc(doc(db,'haja',id), {status: SL[(SL.indexOf(it.status)+1)%3]}); }
  catch(e){ setChip('err'); }
}

function startEdit(id){ editId=editId===id?null:id; delId=null; render(); if(editId)setTimeout(()=>{const el=document.getElementById('et');if(el){el.focus();el.select();}},30); }
function cancelEdit(){ editId=null; render(); }

async function saveEdit() {
  const it = findItem(editId); if(!it) return;
  const t = document.getElementById('et').value.trim(); if(!t) return;
  setChip('ing');
  try {
    await updateDoc(doc(db,'haja',editId), {
      title: t, loc: document.getElementById('el').value || '-', status: document.getElementById('es').value,
      date: document.getElementById('ed').value || '', person: document.getElementById('ep').value || '-'
    });
    editId = null;
  } catch(e){ alert('수정 실패: '+e.message); setChip('err'); }
}

function askDel(id){ delId=delId===id?null:id; editId=null; render(); }
function cancelDel(){ delId=null; render(); }

async function doDel() {
  if(!delId) return;
  setChip('ing');
  try { await deleteDoc(doc(db,'haja',delId)); delId=null; }
  catch(e){ alert('삭제 실패: '+e.message); setChip('err'); }
}

window.setFloor = f => { cur=f; delId=null; editId=null; render(); };
window.cycleS=cycleS; window.startEdit=startEdit; window.cancelEdit=cancelEdit;
window.saveEdit=saveEdit; window.askDel=askDel; window.cancelDel=cancelDel;
window.doDel=doDel; window.addNew=addNew;

let calYear, calMonth;
function getAllItems(){ const all=[]; FLOORS.forEach(f=>(D[f]||[]).forEach(it=>all.push(it))); return all; }
function openCal(){ const now=new Date(); calYear=now.getFullYear(); calMonth=now.getMonth(); document.getElementById('calOverlay').classList.add('open'); renderCal(); }
function closeCal(){ document.getElementById('calOverlay').classList.remove('open'); }
function calMove(d){ calMonth+=d; if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;} renderCal(); }

function makeDateString(y, m, d) { return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }

function renderCal(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = calYear+'년 '+months[calMonth];
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const now = new Date();
  const todayStr = makeDateString(now.getFullYear(), now.getMonth() + 1, now.getDate());
  const dateMap={};
  getAllItems().forEach(it=>{ if(!it.date)return; if(!dateMap[it.date])dateMap[it.date]=[]; dateMap[it.date].push(it); });
  
  let h='';
  const startDay = first.getDay();
  if (startDay > 0) {
    const prevMonthObj = new Date(calYear, calMonth, 0);
    const prevLong = prevMonthObj.getDate();
    const pYear = prevMonthObj.getFullYear();
    const pMonth = prevMonthObj.getMonth() + 1;
    for(let i = startDay - 1; i >= 0; i--){
      const pDate = prevLong - i; const ds = makeDateString(pYear, pMonth, pDate); const items = dateMap[ds]||[];
      const dots = items.slice(0,2).map(it=>`<div class="cal-dot" style="background:${sBg(it.status)};color:${sTx(it.status)}">${it.title.slice(0,5)}</div>`).join('');
      h+=`<div class="cal-day other-month" onclick="calDayClick('${ds}')"><div class="cal-day-num">${pDate}</div><div class="cal-dot-row">${dots}</div></div>`;
    }
  }
  for(let d=1;d<=last.getDate();d++){
    const ds = makeDateString(calYear, calMonth + 1, d); const isToday = (ds === todayStr); const items = dateMap[ds]||[];
    const dots = items.slice(0,3).map(it=>`<div class="cal-dot" style="background:${sBg(it.status)};color:${sTx(it.status)}">${it.title.slice(0,5)}</div>`).join('');
    const more = items.length>3?`<div style="font-size:8px;color:#999;padding-left:2px">+${items.length-3}</div>`:'';
    h+=`<div class="cal-day${isToday?' today':''}" onclick="calDayClick('${ds}')">
      <div class="cal-day-num"><span>${d}</span></div><div class="cal-dot-row">${dots}${more}</div>
    </div>`;
  }
  const endDay = last.getDay();
  if (endDay < 6) {
    const nextMonthObj = new Date(calYear, calMonth + 1, 1);
    const nYear = nextMonthObj.getFullYear(); const nMonth = nextMonthObj.getMonth() + 1; const nextRemain = 6 - endDay;
    for(let i=1; i<=nextRemain; i++){
      const ds = makeDateString(nYear, nMonth, i); const items = dateMap[ds]||[];
      const dots = items.slice(0,2).map(it=>`<div class="cal-dot" style="background:${sBg(it.status)};color:${sTx(it.status)}">${it.title.slice(0,5)}</div>`).join('');
      h+=`<div class="cal-day other-month" onclick="calDayClick('${ds}')"><div class="cal-day-num">${i}</div><div class="cal-dot-row">${dots}</div></div>`;
    }
  }
  document.getElementById('calGrid').innerHTML=h;
}

function calDayClick(ds){
  const p=ds.split('-'); const items=getAllItems().filter(it=>it.date===ds);
  let h=`<div id="dayPopup" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:10px" onclick="if(event.target===this)this.remove()">
    <div style="background:#
